<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヘイロークイズ — ブルーアーカイブ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😇</text></svg>">
<style>
  :root {
    --ba-blue: #128afa;
    --ba-blue-dark: #0b6ac4;
    --ba-navy: #2d3746;
    --ba-sky: #63c8f6;
    --ba-yellow: #fdd35c;
    --correct: #2eb872;
    --wrong: #e8534f;
    --halo-bg1: #8b9db4;
    --halo-bg2: #66788e;
    --halo-bg3: #55677d;
    --halo-border: #7e91a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    background: linear-gradient(160deg, #eaf4fd 0%, #f7fbff 45%, #dceefb 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ba-navy);
    padding: 16px 0;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(18, 138, 250, 0.15);
    width: min(840px, 96vw);
    padding: 34px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--ba-blue), var(--ba-sky));
    z-index: 5;
  }
  h1 { font-size: 1.6rem; letter-spacing: 0.05em; margin-bottom: 4px; }
  .subtitle { color: #7d8a99; font-size: 0.85rem; margin-bottom: 22px; }

  /* ---------- effects layer (全画面) ---------- */
  #fx-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }

  /* ---------- start screen ---------- */
  .start-hero {
    margin: -34px -32px 20px;
    height: 400px;
    background: url(images/bg.jpg) center 68% / cover no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 30px 0 16px;
    position: relative;
  }
  .start-hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0) 72%, rgba(255,255,255,0.85) 100%);
    pointer-events: none;
  }
  .start-hero .logo {
    width: min(360px, 72%);
    filter: drop-shadow(0 4px 14px rgba(11, 74, 132, 0.45));
    position: relative;
    z-index: 1;
  }
  .hero-title {
    position: relative;
    z-index: 1;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 0.25em;
    color: #fff;
    background: linear-gradient(135deg, var(--ba-blue), var(--ba-blue-dark));
    padding: 6px 26px;
    border-radius: 999px;
    box-shadow: 0 4px 14px rgba(18, 138, 250, 0.45);
  }
  .section-label { font-size: 0.9rem; font-weight: 700; margin: 18px 0 10px; }
  .mode-cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .mode-card {
    border: 2px solid #d5e5f2;
    background: #fbfdff;
    border-radius: 14px;
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .mode-card:hover { border-color: var(--ba-sky); }
  .mode-card.selected {
    border-color: var(--ba-blue);
    background: #eaf5ff;
    box-shadow: 0 4px 14px rgba(18, 138, 250, 0.22);
  }
  .mode-card .m-emoji { font-size: 1.7rem; }
  .mode-card .m-name { font-weight: 800; font-size: 0.94rem; margin: 4px 0 2px; }
  .mode-card .m-desc { font-size: 0.7rem; color: #7d8a99; line-height: 1.5; }
  .sub-options {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .sub-options .seg {
    border: 2px solid #d5e5f2;
    background: #fff;
    border-radius: 999px;
    padding: 7px 22px;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--ba-navy);
    cursor: pointer;
    transition: all 0.15s;
  }
  .sub-options .seg.selected {
    background: var(--ba-blue);
    border-color: var(--ba-blue);
    color: #fff;
  }
  .mode-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .mode-btn {
    border: 2px solid #d5e5f2;
    background: #fff;
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--ba-navy);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--ba-sky); }
  .mode-btn.selected {
    background: var(--ba-blue);
    border-color: var(--ba-blue);
    color: #fff;
    box-shadow: 0 4px 12px rgba(18, 138, 250, 0.35);
  }
  .fx-toggle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 20px auto 24px;
    cursor: pointer;
    user-select: none;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .fx-toggle .track {
    width: 52px;
    height: 28px;
    background: #d5e5f2;
    border-radius: 999px;
    position: relative;
    transition: background 0.2s;
  }
  .fx-toggle .knob {
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: left 0.2s;
  }
  .fx-toggle.on .track { background: linear-gradient(90deg, #ff8fb1, var(--ba-yellow), var(--ba-sky)); }
  .fx-toggle.on .knob { left: 27px; }
  .primary-btn {
    display: block;
    margin: 0 auto;
    background: linear-gradient(135deg, var(--ba-blue), var(--ba-blue-dark));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 60px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(18, 138, 250, 0.4);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 9px 22px rgba(18, 138, 250, 0.45); }
  .primary-btn:active { transform: translateY(0); }

  /* ---------- quiz screen ---------- */
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #7d8a99;
    margin-bottom: 10px;
  }
  .home-btn {
    border: 1.5px solid #d5e5f2;
    background: #fff;
    color: #7d8a99;
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    flex: 0 0 auto;
  }
  .home-btn:hover { border-color: var(--wrong); color: var(--wrong); }
  .streak { color: var(--ba-blue); }
  .progress-track { height: 6px; background: #e4eef7; border-radius: 3px; margin-bottom: 18px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ba-blue), var(--ba-sky));
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .halo-frame {
    width: 220px;
    height: 220px;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 42%, var(--halo-bg1) 0%, var(--halo-bg2) 62%, var(--halo-bg3) 100%);
    border: 3px solid var(--halo-border);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 12px rgba(20, 30, 45, 0.28), 0 4px 14px rgba(18, 138, 250, 0.15);
  }
  .halo-frame img {
    width: 178px;
    height: 178px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(20, 30, 45, 0.35));
  }
  .portrait-q {
    height: 300px;
    max-width: 90%;
    object-fit: contain;
    margin: 0 auto 8px;
    display: block;
    filter: drop-shadow(0 6px 14px rgba(45, 55, 70, 0.25));
  }
  .question-text { font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    border: 2px solid #d5e5f2;
    background: #fbfdff;
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ba-navy);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
  }
  .choice-btn.text-only { justify-content: center; text-align: center; padding: 12px 8px; }
  .choice-btn:hover:not(:disabled) { border-color: var(--ba-blue); background: #f0f8ff; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .key-hint { font-size: 0.7rem; color: #b0c2d2; font-weight: 700; flex: 0 0 auto; }
  .face {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    overflow: hidden;
    flex: 0 0 auto;
    background: #e8f2fb;
    border: 2px solid #d5e9fa;
    position: relative;
  }
  .face img {
    position: absolute;
    width: 170%;
    left: -35%;
    top: -50%;
  }
  .face.unknown::after {
    content: "?";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 800;
    color: #9fb8cd;
  }
  .choice-btn .cname { flex: 1; }
  .choice-btn.text-only .cname { flex: 0 1 auto; }
  .choice-btn.correct { background: var(--correct); border-color: var(--correct); color: #fff; animation: pop 0.35s; }
  .choice-btn.wrong { background: var(--wrong); border-color: var(--wrong); color: #fff; animation: shake 0.4s; }
  .choice-btn.dim { opacity: 0.4; }
  @keyframes pop { 50% { transform: scale(1.05); } }
  @keyframes shake {
    20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
  }

  /* 入力式回答 */
  .type-answer {
    display: flex;
    gap: 8px;
    justify-content: center;
    max-width: 420px;
    margin: 0 auto;
  }
  .type-answer input {
    flex: 1;
    border: 2px solid #d5e5f2;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 16px;
    font-weight: 600;
    color: var(--ba-navy);
    outline: none;
    min-width: 0;
  }
  .type-answer input:focus { border-color: var(--ba-blue); }
  .type-answer button {
    background: linear-gradient(135deg, var(--ba-blue), var(--ba-blue-dark));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 26px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .type-hint { font-size: 0.75rem; color: #a8b8c8; margin-top: 8px; }

  /* ---------- reveal panel ---------- */
  .reveal { animation: fadeup 0.35s ease; }
  @keyframes fadeup { from { opacity: 0; transform: translateY(14px); } }
  .reveal-judge { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
  .reveal-judge.ok { color: var(--correct); }
  .reveal-judge.ng { color: var(--wrong); }
  .reveal-body {
    display: flex;
    gap: 26px;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }
  .reveal-body .portrait {
    height: min(58vh, 540px);
    max-width: 48%;
    object-fit: contain;
    filter: drop-shadow(0 6px 14px rgba(45, 55, 70, 0.25));
    animation: portrait-in 0.45s cubic-bezier(0.2, 0.8, 0.3, 1.15);
  }
  @keyframes portrait-in { from { opacity: 0; transform: translateY(24px) scale(0.92); } }
  .reveal-info { text-align: center; min-width: 0; }
  .reveal-info .label { font-size: 0.8rem; color: #7d8a99; font-weight: 700; letter-spacing: 0.1em; }
  .reveal-info .fullname { font-size: 1.9rem; font-weight: 800; margin: 4px 0 2px; }
  .reveal-info .fn-reading { font-size: 0.85rem; color: #7d8a99; font-weight: 600; margin-bottom: 10px; }
  .reveal-info .halo-mini {
    width: 130px;
    height: 130px;
    object-fit: contain;
    padding: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 42%, var(--halo-bg1) 0%, var(--halo-bg2) 62%, var(--halo-bg3) 100%);
    border: 2px solid var(--halo-border);
  }
  .reveal-info .picked-note { font-size: 0.9rem; color: var(--wrong); font-weight: 600; margin-top: 10px; }
  .profile-table {
    margin: 14px auto 0;
    border-collapse: collapse;
    font-size: 0.92rem;
    text-align: left;
  }
  .profile-table th {
    background: #eaf4fd;
    color: var(--ba-blue-dark);
    font-weight: 700;
    padding: 7px 14px;
    border: 1px solid #d5e9fa;
    white-space: nowrap;
    font-size: 0.8rem;
  }
  .profile-table td {
    padding: 7px 14px;
    border: 1px solid #e0ecf6;
    font-weight: 600;
    max-width: 240px;
  }

  /* ---------- 学習モード ---------- */
  .study-tools {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .study-tools input {
    flex: 1;
    min-width: 140px;
    border: 2px solid #d5e5f2;
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 16px;
    font-weight: 600;
    outline: none;
  }
  .study-tools input:focus { border-color: var(--ba-blue); }
  .school-chips {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
    margin-bottom: 12px;
    scrollbar-width: thin;
  }
  .chip {
    border: 1.5px solid #d5e5f2;
    background: #fff;
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--ba-navy);
    cursor: pointer;
    white-space: nowrap;
    flex: 0 0 auto;
    transition: all 0.15s;
  }
  .chip.selected { background: var(--ba-blue); border-color: var(--ba-blue); color: #fff; }
  .study-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    max-height: 55vh;
    overflow-y: auto;
    padding: 4px;
  }
  .study-item {
    background: #f6fafd;
    border: 1px solid #e0ecf6;
    border-radius: 12px;
    padding: 10px 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .study-item:hover { border-color: var(--ba-blue); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(18,138,250,0.18); }
  .study-item img {
    width: 74px;
    height: 74px;
    object-fit: contain;
    background: radial-gradient(circle at 50% 45%, var(--halo-bg1) 0%, var(--halo-bg3) 85%);
    border-radius: 50%;
    padding: 6px;
    margin-bottom: 5px;
  }
  .study-item .s-name { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 4px; }
  .study-count { font-size: 0.75rem; color: #7d8a99; margin-bottom: 8px; text-align: right; }

  /* 学習モード詳細モーダル */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 45, 0.55);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
  }
  .modal-card {
    background: #fff;
    border-radius: 18px;
    padding: 26px 22px 20px;
    width: min(680px, 96vw);
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
    text-align: center;
    animation: fadeup 0.25s ease;
  }
  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    border: none;
    background: #eef4fa;
    color: #7d8a99;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
  }
  .modal-nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 14px;
  }
  .modal-nav button {
    border: 2px solid #d5e5f2;
    background: #fff;
    border-radius: 999px;
    padding: 8px 24px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--ba-navy);
    cursor: pointer;
  }
  .modal-nav button:hover { border-color: var(--ba-blue); color: var(--ba-blue); }

  /* ---------- effects ---------- */
  .stamp {
    position: absolute;
    top: 46%;
    left: 50%;
    z-index: 20;
    font-size: 7rem;
    font-weight: 900;
    pointer-events: none;
    opacity: 0;
  }
  .stamp.show-ok {
    color: rgba(46, 184, 114, 0.85);
    text-shadow: 0 0 30px rgba(46, 184, 114, 0.5);
    animation: stamp-in 0.9s ease forwards;
  }
  .stamp.show-ng {
    color: rgba(232, 83, 79, 0.85);
    text-shadow: 0 0 30px rgba(232, 83, 79, 0.5);
    animation: stamp-in 0.9s ease forwards;
  }
  .stamp.mega { font-size: 11rem; }
  @keyframes stamp-in {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(2.6) rotate(-18deg); }
    35% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-12deg); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(-12deg); }
  }
  .flash-ng { animation: flash-red 0.5s ease; }
  @keyframes flash-red {
    0% { box-shadow: inset 0 0 0 999px rgba(232, 83, 79, 0); }
    30% { box-shadow: inset 0 0 0 999px rgba(232, 83, 79, 0.16); }
    100% { box-shadow: inset 0 0 0 999px rgba(232, 83, 79, 0); }
  }
  .flash-rainbow { animation: flash-rb 0.8s ease; }
  @keyframes flash-rb {
    0% { box-shadow: inset 0 0 0 999px rgba(255, 143, 177, 0); }
    25% { box-shadow: inset 0 0 0 999px rgba(255, 143, 177, 0.14); }
    50% { box-shadow: inset 0 0 0 999px rgba(253, 211, 92, 0.14); }
    75% { box-shadow: inset 0 0 0 999px rgba(99, 200, 246, 0.14); }
    100% { box-shadow: inset 0 0 0 999px rgba(99, 200, 246, 0); }
  }
  .pulse-win { animation: pulse-win 0.6s cubic-bezier(0.3, 1.6, 0.4, 1); }
  @keyframes pulse-win {
    0% { transform: scale(1); }
    35% { transform: scale(1.035) rotate(0.6deg); }
    65% { transform: scale(0.99) rotate(-0.4deg); }
    100% { transform: scale(1); }
  }
  .quake { animation: quake 0.7s ease; }
  @keyframes quake {
    8% { transform: translate(-14px, 8px) rotate(-1.4deg); }
    22% { transform: translate(13px, -10px) rotate(1.2deg); }
    38% { transform: translate(-11px, -6px) rotate(-1deg); }
    54% { transform: translate(10px, 7px) rotate(0.8deg); }
    70% { transform: translate(-7px, -4px) rotate(-0.5deg); }
    85% { transform: translate(4px, 3px); }
  }
  .confetti {
    position: absolute;
    top: -16px;
    width: 10px;
    height: 14px;
    pointer-events: none;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    to { transform: translateY(112vh) rotate(900deg); opacity: 0.55; }
  }
  .spark {
    position: absolute;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    pointer-events: none;
    animation: spark-fly ease-out forwards;
  }
  @keyframes spark-fly {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.25); opacity: 0; }
  }
  .fx-emoji {
    position: absolute;
    top: -50px;
    font-size: 2rem;
    pointer-events: none;
    animation: emoji-fall linear forwards;
  }
  @keyframes emoji-fall {
    to { transform: translateY(115vh) rotate(360deg); opacity: 0.8; }
  }
  .streak-banner {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.6rem;
    font-weight: 900;
    color: #ff8a00;
    text-shadow: 0 0 18px rgba(255, 170, 0, 0.6), 0 2px 0 #fff;
    pointer-events: none;
    animation: streak-pop 1.1s ease forwards;
    white-space: nowrap;
  }
  @keyframes streak-pop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    25% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    45% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -70%) scale(1.05); }
  }
  .vignette-ng {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(232,83,79,0) 55%, rgba(200, 30, 30, 0.4) 100%);
    animation: vig-fade 0.8s ease forwards;
  }
  @keyframes vig-fade {
    0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; }
  }

  .next-btn {
    background: linear-gradient(135deg, var(--ba-blue), var(--ba-blue-dark));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 11px 48px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    box-shadow: 0 5px 14px rgba(18, 138, 250, 0.4);
    transition: transform 0.12s;
  }
  .next-btn:hover { transform: translateY(-2px); }
  .key-tip { font-size: 0.7rem; color: #a8b8c8; margin-top: 8px; }

  /* ---------- result screen ---------- */
  .score-big { font-size: 3rem; font-weight: 800; color: var(--ba-blue); margin: 8px 0 2px; }
  .score-sub { color: #7d8a99; font-size: 0.9rem; margin-bottom: 6px; }
  .rank-badge {
    display: inline-block;
    background: var(--ba-yellow);
    color: #7a5c00;
    font-weight: 800;
    border-radius: 999px;
    padding: 6px 22px;
    margin-bottom: 20px;
    font-size: 1.05rem;
  }
  .miss-title { font-size: 0.9rem; font-weight: 700; margin: 6px 0 10px; }
  .miss-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-height: 230px;
    overflow-y: auto;
    margin-bottom: 22px;
    padding: 4px;
  }
  .miss-item {
    width: 96px;
    background: #f6fafd;
    border: 1px solid #e0ecf6;
    border-radius: 10px;
    padding: 8px 4px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .miss-item img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    background: radial-gradient(circle at 50% 45%, var(--halo-bg1) 0%, var(--halo-bg3) 85%);
    border-radius: 50%;
    padding: 5px;
  }
  .miss-item .ans { color: var(--correct); display: block; }
  .miss-item .yours { color: var(--wrong); display: block; text-decoration: line-through; }
  .hidden { display: none !important; }

  /* ---------- スマホ対応 ---------- */
  @media (max-width: 640px) {
    body { align-items: flex-start; padding: 8px 0; }
    .card { padding: 22px 14px; border-radius: 16px; }
    h1 { font-size: 1.35rem; }
    .start-hero { margin: -22px -14px 16px; height: 300px; padding-top: 20px; }
    .hero-title { font-size: 1.1rem; padding: 5px 20px; }
    .mode-cards { grid-template-columns: 1fr 1fr; gap: 8px; }
    .mode-card { padding: 10px 6px; }
    .mode-card .m-emoji { font-size: 1.4rem; }
    .mode-card .m-name { font-size: 0.85rem; }
    .mode-card .m-desc { font-size: 0.64rem; }
    .halo-frame { width: 160px; height: 160px; }
    .halo-frame img { width: 128px; height: 128px; }
    .portrait-q { height: 200px; }
    .choices { grid-template-columns: 1fr 1fr; gap: 8px; }
    .choice-btn { padding: 8px 8px; font-size: 0.88rem; gap: 7px; }
    .choice-btn .key-hint { display: none; }
    .face { width: 46px; height: 46px; }
    .key-tip { display: none; }
    .reveal-body { flex-direction: column; gap: 12px; }
    .reveal-body .portrait { height: 38vh; max-width: 90%; }
    .reveal-info .fullname { font-size: 1.5rem; }
    .reveal-info .halo-mini { width: 100px; height: 100px; padding: 10px; }
    .reveal-judge { font-size: 1.25rem; margin-bottom: 8px; }
    .profile-table { font-size: 0.85rem; }
    .stamp { font-size: 5rem; }
    .stamp.mega { font-size: 7rem; }
    .streak-banner { font-size: 1.8rem; }
    .score-big { font-size: 2.3rem; }
    .study-grid { grid-template-columns: repeat(3, 1fr); max-height: 60vh; }
    .study-item img { width: 62px; height: 62px; }
  }
</style>
</head>
<body>

<div id="fx-layer"></div>

<div class="card" id="card">
  <div class="stamp" id="stamp"></div>

  <!-- スタート画面 -->
  <div id="screen-start">
    <div class="start-hero">
      <img class="logo" src="images/logo.webp" alt="ブルーアーカイブ">
      <div class="hero-title">HALO クイズ</div>
    </div>
    <p class="subtitle">ヘイローを見て、どのキャラクターのものか当てよう！（全195種）</p>

    <p class="section-label">モードを選んでください</p>
    <div class="mode-cards" id="mode-cards">
      <div class="mode-card selected" data-mode="normal">
        <span class="m-emoji">😇</span>
        <div><div class="m-name">ヘイロークイズ</div><div class="m-desc">定番の4択</div></div>
      </div>
      <div class="mode-card" data-mode="hard">
        <span class="m-emoji">🔥</span>
        <div><div class="m-name">ハードモード</div><div class="m-desc">8択・同じ学園が混ざる</div></div>
      </div>
      <div class="mode-card" data-mode="surname">
        <span class="m-emoji">📛</span>
        <div><div class="m-name">苗字当てクイズ</div><div class="m-desc">立ち絵から苗字を当てる</div></div>
      </div>
      <div class="mode-card" data-mode="study">
        <span class="m-emoji">📖</span>
        <div><div class="m-name">学習モード</div><div class="m-desc">全キャラの図鑑で暗記</div></div>
      </div>
    </div>

    <div class="sub-options hidden" id="surname-options">
      <button class="seg selected" data-fmt="choice">4択で答える</button>
      <button class="seg" data-fmt="input">入力して答える</button>
    </div>

    <div id="quiz-config">
      <p class="section-label">出題数</p>
      <div class="mode-row" id="mode-row">
        <button class="mode-btn selected" data-count="10">10問</button>
        <button class="mode-btn" data-count="25">25問</button>
        <button class="mode-btn" data-count="50">50問</button>
        <button class="mode-btn" data-count="all">全問</button>
      </div>

      <div class="fx-toggle" id="fx-toggle">
        <span class="track"><span class="knob"></span></span>
        <span>🎆 ド派手エフェクト</span>
      </div>
    </div>

    <button class="primary-btn" id="btn-start">スタート</button>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz" class="hidden">
    <div class="status-row">
      <button class="home-btn" id="btn-home">⌂ トップへ</button>
      <span id="q-counter"></span>
      <span class="streak" id="q-streak"></span>
      <span id="q-score"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="q-progress"></div></div>

    <!-- 出題ビュー -->
    <div id="q-view">
      <div class="halo-frame" id="q-halo-frame"><img id="q-image" src="" alt="ヘイロー"></div>
      <img class="portrait-q hidden" id="q-portrait" src="" alt="立ち絵">
      <p class="question-text" id="q-text">このヘイローは誰のもの？</p>
      <div class="choices" id="q-choices"></div>
      <div class="type-answer hidden" id="q-type">
        <input type="text" id="q-input" placeholder="苗字を入力（漢字 or ひらがな）" autocomplete="off">
        <button id="btn-submit">回答</button>
      </div>
      <p class="type-hint hidden" id="q-type-hint">読み仮名（ひらがな）でも正解になります</p>
      <p class="key-tip" id="q-keytip">キーボードの数字キーでも回答できます</p>
    </div>

    <!-- 正解発表ビュー -->
    <div id="r-view" class="hidden">
      <div class="reveal">
        <div class="reveal-judge" id="rv-judge"></div>
        <div class="reveal-body">
          <img class="portrait" id="rv-portrait" src="" alt="">
          <div class="reveal-info">
            <div class="label">正解</div>
            <div class="fullname" id="rv-fullname"></div>
            <div class="fn-reading" id="rv-reading"></div>
            <img class="halo-mini" id="rv-halo" src="" alt="">
            <table class="profile-table">
              <tr><th>学園</th><td id="rv-school"></td></tr>
              <tr><th>部活</th><td id="rv-club"></td></tr>
              <tr><th>誕生日</th><td id="rv-birthday"></td></tr>
            </table>
            <div class="picked-note" id="rv-picked"></div>
          </div>
        </div>
        <button class="next-btn" id="btn-next">次へ</button>
        <p class="key-tip">Enter / Space でも進めます</p>
      </div>
    </div>
  </div>

  <!-- 学習モード画面 -->
  <div id="screen-study" class="hidden">
    <div class="status-row">
      <button class="home-btn" id="btn-study-home">⌂ トップへ</button>
      <span style="font-weight:800; color:var(--ba-navy);">📖 学習モード</span>
      <span></span>
    </div>
    <div class="study-tools">
      <input type="text" id="study-search" placeholder="🔍 名前で検索" autocomplete="off">
    </div>
    <div class="school-chips" id="school-chips"></div>
    <div class="study-count" id="study-count"></div>
    <div class="study-grid" id="study-grid"></div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="hidden">
    <h1>結果発表</h1>
    <div class="score-big" id="r-score"></div>
    <div class="score-sub" id="r-detail"></div>
    <div class="rank-badge" id="r-rank"></div>
    <div id="r-miss-block">
      <p class="miss-title">間違えた問題</p>
      <div class="miss-list" id="r-miss"></div>
    </div>
    <button class="primary-btn" id="btn-retry">もう一度</button>
  </div>
</div>

<!-- 学習モード詳細モーダル -->
<div class="modal hidden" id="study-modal">
  <div class="modal-card">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="reveal-body">
      <img class="portrait" id="sd-portrait" src="" alt="">
      <div class="reveal-info">
        <div class="fullname" id="sd-fullname"></div>
        <div class="fn-reading" id="sd-reading"></div>
        <img class="halo-mini" id="sd-halo" src="" alt="">
        <table class="profile-table">
          <tr><th>学園</th><td id="sd-school"></td></tr>
          <tr><th>部活</th><td id="sd-club"></td></tr>
          <tr><th>誕生日</th><td id="sd-birthday"></td></tr>
        </table>
      </div>
    </div>
    <div class="modal-nav">
      <button id="sd-prev">← 前へ</button>
      <button id="sd-next">次へ →</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const screens = { start: $("screen-start"), quiz: $("screen-quiz"), study: $("screen-study"), result: $("screen-result") };
  const show = (name) => Object.entries(screens).forEach(([k, el]) => el.classList.toggle("hidden", k !== name));

  const SURNAME_POOL = CHARACTERS.filter(
    (c) => c.fullName !== c.name && c.fullName.endsWith(c.name)
  ).map((c) => ({ ...c, surname: c.fullName.slice(0, c.fullName.length - c.name.length) }));

  const schoolKey = (c) => (c.school || "").replace(/[0-9０-９]+年生$/, "") || "その他";

  let mode = "normal";        // normal | hard | surname | study
  let surnameFmt = "choice";  // choice | input
  let hade = false;
  let questionCount = 10;
  let queue = [];
  let qIndex = 0;
  let score = 0;
  let streak = 0;
  let misses = [];
  let locked = false;
  let revealing = false;

  const shuffle = (arr) => {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  // カタカナ→ひらがな・空白除去（入力式の判定用）
  const normalize = (s) =>
    s.trim().replace(/[ 　]/g, "").replace(/[ァ-ヶ]/g, (m) => String.fromCharCode(m.charCodeAt(0) - 0x60));

  const faceHtml = (c) =>
    c.face
      ? `<span class="face"><img src="images/face/${c.id}.png" alt=""></span>`
      : `<span class="face unknown"></span>`;

  /* ---------- start screen events ---------- */
  $("mode-cards").addEventListener("click", (e) => {
    const cardEl = e.target.closest(".mode-card");
    if (!cardEl) return;
    document.querySelectorAll(".mode-card").forEach((c) => c.classList.remove("selected"));
    cardEl.classList.add("selected");
    mode = cardEl.dataset.mode;
    $("surname-options").classList.toggle("hidden", mode !== "surname");
    $("quiz-config").classList.toggle("hidden", mode === "study");
    $("btn-start").textContent = mode === "study" ? "図鑑を開く" : "スタート";
  });

  $("surname-options").addEventListener("click", (e) => {
    const seg = e.target.closest(".seg");
    if (!seg) return;
    document.querySelectorAll("#surname-options .seg").forEach((s) => s.classList.remove("selected"));
    seg.classList.add("selected");
    surnameFmt = seg.dataset.fmt;
  });

  $("mode-row").addEventListener("click", (e) => {
    const btn = e.target.closest(".mode-btn");
    if (!btn) return;
    document.querySelectorAll(".mode-btn").forEach((b) => b.classList.remove("selected"));
    btn.classList.add("selected");
    questionCount = btn.dataset.count;
  });

  $("fx-toggle").addEventListener("click", () => {
    hade = !hade;
    $("fx-toggle").classList.toggle("on", hade);
  });

  $("btn-start").addEventListener("click", () => {
    if (mode === "study") openStudy();
    else startGame();
  });
  $("btn-retry").addEventListener("click", () => show("start"));
  $("btn-next").addEventListener("click", nextQuestion);
  $("btn-home").addEventListener("click", () => {
    if (confirm("クイズを中断してトップに戻りますか？")) show("start");
  });
  $("btn-study-home").addEventListener("click", () => show("start"));
  $("btn-submit").addEventListener("click", submitTyped);
  $("q-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); submitTyped(); }
  });

  /* ---------- quiz flow ---------- */
  function pool() {
    return mode === "surname" ? SURNAME_POOL : CHARACTERS;
  }

  function startGame() {
    const p = pool();
    const n = questionCount === "all" ? p.length : Math.min(Number(questionCount), p.length);
    queue = shuffle(p).slice(0, n);
    qIndex = 0;
    score = 0;
    streak = 0;
    misses = [];
    show("quiz");
    renderQuestion();
  }

  function updateStatus() {
    $("q-counter").textContent = `Q${qIndex + 1} / ${queue.length}`;
    $("q-score").textContent = `スコア ${score}`;
    $("q-streak").textContent = streak >= 2 ? `🔥 ${streak}連続` : "";
    $("q-progress").style.width = `${(qIndex / queue.length) * 100}%`;
  }

  function buildOptions(char) {
    if (mode === "surname") {
      const others = shuffle([...new Set(SURNAME_POOL.map((c) => c.surname))].filter((s) => s !== char.surname)).slice(0, 3);
      return shuffle([
        { label: char.surname, correct: true, faceChar: null },
        ...others.map((s) => ({ label: s, correct: false, faceChar: null })),
      ]);
    }
    if (mode === "hard") {
      const key = schoolKey(char);
      const same = shuffle(CHARACTERS.filter((c) => c.id !== char.id && schoolKey(c) === key));
      const rest = shuffle(CHARACTERS.filter((c) => c.id !== char.id && schoolKey(c) !== key));
      const distractors = [...same, ...rest].slice(0, 7);
      return shuffle([
        { label: char.name, correct: true, faceChar: null },
        ...distractors.map((c) => ({ label: c.name, correct: false, faceChar: null })),
      ]);
    }
    const distractors = shuffle(CHARACTERS.filter((c) => c.id !== char.id)).slice(0, 3);
    return shuffle([
      { label: char.name, correct: true, faceChar: char },
      ...distractors.map((c) => ({ label: c.name, correct: false, faceChar: c })),
    ]);
  }

  function renderQuestion() {
    locked = false;
    revealing = false;
    $("r-view").classList.add("hidden");
    $("q-view").classList.remove("hidden");
    updateStatus();

    const char = queue[qIndex];
    const typing = mode === "surname" && surnameFmt === "input";

    if (mode === "surname") {
      $("q-halo-frame").classList.add("hidden");
      $("q-portrait").classList.remove("hidden");
      $("q-portrait").src = char.full ? `images/full/${char.id}.png` : `images/${char.id}.png`;
      $("q-text").textContent = `「${char.name}」の苗字は${typing ? "？" : "どれ？"}`;
    } else {
      $("q-halo-frame").classList.remove("hidden");
      $("q-portrait").classList.add("hidden");
      $("q-image").src = `images/${char.id}.png`;
      $("q-text").textContent = mode === "hard" ? "このヘイローは誰のもの？（8択）" : "このヘイローは誰のもの？";
    }

    $("q-choices").classList.toggle("hidden", typing);
    $("q-type").classList.toggle("hidden", !typing);
    $("q-type-hint").classList.toggle("hidden", !typing);
    $("q-keytip").classList.toggle("hidden", typing);

    if (typing) {
      $("q-input").value = "";
      $("q-input").disabled = false;
      $("btn-submit").disabled = false;
      setTimeout(() => $("q-input").focus(), 50);
      return;
    }

    const options = buildOptions(char);
    const box = $("q-choices");
    box.innerHTML = "";
    options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn" + (opt.faceChar ? "" : " text-only");
      btn.dataset.correct = opt.correct ? "1" : "";
      btn.innerHTML =
        `<span class="key-hint">${i + 1}</span>` +
        (opt.faceChar ? faceHtml(opt.faceChar) : "") +
        `<span class="cname">${opt.label}</span>`;
      btn.addEventListener("click", () => answer(opt, btn));
      box.appendChild(btn);
    });
  }

  function judge(correct, pickedLabel) {
    const char = queue[qIndex];
    if (correct) {
      score++;
      streak++;
      stampEffect("〇", true);
      fxCorrect();
    } else {
      streak = 0;
      misses.push({ char, pickedLabel });
      stampEffect("✕", false);
      fxWrong();
    }
    updateStatus();
    setTimeout(() => showReveal(char, pickedLabel, correct), 850);
  }

  function answer(picked, btn) {
    if (locked) return;
    locked = true;
    const buttons = [...document.querySelectorAll(".choice-btn")];
    buttons.forEach((b) => (b.disabled = true));
    btn.classList.add(picked.correct ? "correct" : "wrong");
    buttons.forEach((b) => {
      if (b.dataset.correct) b.classList.add("correct");
      else if (!b.classList.contains("wrong")) b.classList.add("dim");
    });
    judge(picked.correct, picked.label);
  }

  function submitTyped() {
    if (locked) return;
    const char = queue[qIndex];
    const input = $("q-input").value;
    if (!input.trim()) return;
    locked = true;
    $("q-input").disabled = true;
    $("btn-submit").disabled = true;
    const n = normalize(input);
    const correct = n === normalize(char.surname) || (char.reading && n === normalize(char.reading));
    judge(correct, input.trim());
  }

  function showReveal(char, pickedLabel, correct) {
    revealing = true;
    $("q-view").classList.add("hidden");
    $("r-view").classList.remove("hidden");

    const judgeEl = $("rv-judge");
    judgeEl.textContent = correct ? "正解！" : "不正解…";
    judgeEl.className = "reveal-judge " + (correct ? "ok" : "ng");

    $("rv-portrait").src = char.full ? `images/full/${char.id}.png` : `images/${char.id}.png`;
    $("rv-fullname").textContent = char.fullName;
    $("rv-reading").textContent = char.reading ? `（${char.reading}${char.fullName !== char.name ? "" : ""}）` : "";
    $("rv-halo").src = `images/${char.id}.png`;
    const dash = (v) => (v && v !== "-" ? v : "—");
    $("rv-school").textContent = dash(char.school);
    $("rv-club").textContent = dash(char.club);
    $("rv-birthday").textContent = dash(char.birthday);
    $("rv-picked").textContent = correct ? "" : `あなたの回答：${pickedLabel}`;
  }

  function nextQuestion() {
    if (!revealing) return;
    qIndex++;
    if (qIndex < queue.length) renderQuestion();
    else showResult();
  }

  /* ---------- effects ---------- */
  const FX_COLORS = ["#128afa", "#63c8f6", "#fdd35c", "#2eb872", "#ff8fb1", "#b28bff", "#ff9d5c"];
  const fxLayer = () => $("fx-layer");

  function fxCorrect() {
    if (!hade) {
      confettiBurst(36);
      return;
    }
    confettiBurst(240);
    fireworks(7, 34);
    emojiRain(["🎉", "⭐", "✨", "😇", "💙", "🎊"], 20);
    flashCard("flash-rainbow");
    pulseCard();
    if (streak >= 3) streakBanner(`🔥 ${streak}連続！`);
  }

  function fxWrong() {
    flashCard("flash-ng");
    if (!hade) return;
    quakeCard();
    vignette();
    emojiRain(["💥", "😱", "💦", "🌀"], 12);
  }

  function stampEffect(text, ok) {
    const stamp = $("stamp");
    stamp.textContent = text;
    stamp.className = "stamp" + (hade ? " mega" : "");
    void stamp.offsetWidth;
    stamp.classList.add(ok ? "show-ok" : "show-ng");
  }

  function flashCard(cls) {
    const card = $("card");
    card.classList.remove(cls);
    void card.offsetWidth;
    card.classList.add(cls);
  }

  function pulseCard() {
    const card = $("card");
    card.classList.remove("pulse-win");
    void card.offsetWidth;
    card.classList.add("pulse-win");
  }

  function quakeCard() {
    const card = $("card");
    card.classList.remove("quake");
    void card.offsetWidth;
    card.classList.add("quake");
  }

  function vignette() {
    const v = document.createElement("div");
    v.className = "vignette-ng";
    fxLayer().appendChild(v);
    setTimeout(() => v.remove(), 850);
  }

  function streakBanner(text) {
    const b = document.createElement("div");
    b.className = "streak-banner";
    b.textContent = text;
    fxLayer().appendChild(b);
    setTimeout(() => b.remove(), 1150);
  }

  function confettiBurst(count) {
    const layer = fxLayer();
    for (let i = 0; i < count; i++) {
      const p = document.createElement("div");
      p.className = "confetti";
      p.style.left = Math.random() * 100 + "%";
      p.style.background = FX_COLORS[Math.floor(Math.random() * FX_COLORS.length)];
      p.style.animationDuration = 0.9 + Math.random() * 1.4 + "s";
      p.style.animationDelay = Math.random() * 0.4 + "s";
      p.style.transform = `rotate(${Math.random() * 360}deg)`;
      const r = Math.random();
      if (r < 0.3) p.style.borderRadius = "50%";
      else if (r < 0.45) { p.style.width = "5px"; p.style.height = "18px"; }
      layer.appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }
  }

  function fireworks(bursts, particles) {
    const layer = fxLayer();
    for (let b = 0; b < bursts; b++) {
      const cx = 8 + Math.random() * 84;
      const cy = 8 + Math.random() * 60;
      setTimeout(() => {
        for (let i = 0; i < particles; i++) {
          const s = document.createElement("div");
          s.className = "spark";
          const angle = (Math.PI * 2 * i) / particles + Math.random() * 0.25;
          const dist = 70 + Math.random() * 130;
          s.style.left = cx + "%";
          s.style.top = cy + "%";
          const col = FX_COLORS[Math.floor(Math.random() * FX_COLORS.length)];
          s.style.background = col;
          s.style.boxShadow = `0 0 10px ${col}`;
          s.style.setProperty("--dx", Math.cos(angle) * dist + "px");
          s.style.setProperty("--dy", Math.sin(angle) * dist + "px");
          s.style.animationDuration = 0.7 + Math.random() * 0.5 + "s";
          layer.appendChild(s);
          setTimeout(() => s.remove(), 1300);
        }
      }, b * 160);
    }
  }

  function emojiRain(emojis, count) {
    const layer = fxLayer();
    for (let i = 0; i < count; i++) {
      const e = document.createElement("div");
      e.className = "fx-emoji";
      e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      e.style.left = Math.random() * 96 + "%";
      e.style.fontSize = 1.4 + Math.random() * 1.6 + "rem";
      e.style.animationDuration = 1.2 + Math.random() * 1.4 + "s";
      e.style.animationDelay = Math.random() * 0.5 + "s";
      layer.appendChild(e);
      setTimeout(() => e.remove(), 3300);
    }
  }

  /* ---------- 結果 ---------- */
  function showResult() {
    show("result");
    const total = queue.length;
    const rate = Math.round((score / total) * 100);
    $("r-score").textContent = `${score} / ${total}`;
    $("r-detail").textContent = `正解率 ${rate}%`;
    const rank =
      rate === 100 ? "SS — 完璧な先生！" :
      rate >= 90 ? "S — さすが先生！" :
      rate >= 70 ? "A — かなりの生徒通" :
      rate >= 50 ? "B — まずまず！" :
      rate >= 30 ? "C — まだまだこれから" :
      "D — シャーレで復習しましょう";
    $("r-rank").textContent = rank;

    if (rate === 100) {
      confettiBurst(hade ? 300 : 50);
      if (hade) { fireworks(9, 36); emojiRain(["🏆", "🎉", "⭐", "😇"], 24); }
    }

    const missBlock = $("r-miss-block");
    const missBox = $("r-miss");
    missBox.innerHTML = "";
    missBlock.classList.toggle("hidden", misses.length === 0);
    misses.forEach(({ char, pickedLabel }) => {
      const div = document.createElement("div");
      div.className = "miss-item";
      const imgSrc = mode === "surname" && char.face ? `images/face/${char.id}.png` : `images/${char.id}.png`;
      div.innerHTML = `<img src="${imgSrc}" alt=""><span class="ans">${char.fullName}</span><span class="yours">${pickedLabel}</span>`;
      missBox.appendChild(div);
    });
  }

  /* ---------- 学習モード ---------- */
  let studyList = [];
  let studyIndex = 0;
  let studySchool = "すべて";

  function openStudy() {
    show("study");
    if (!$("school-chips").childElementCount) buildChips();
    renderStudyGrid();
  }

  function buildChips() {
    const counts = {};
    CHARACTERS.forEach((c) => {
      const k = schoolKey(c);
      counts[k] = (counts[k] || 0) + 1;
    });
    const keys = ["すべて", ...Object.keys(counts).sort((a, b) => counts[b] - counts[a])];
    const box = $("school-chips");
    keys.forEach((k) => {
      const chip = document.createElement("button");
      chip.className = "chip" + (k === "すべて" ? " selected" : "");
      chip.textContent = k === "すべて" ? `すべて (${CHARACTERS.length})` : `${k} (${counts[k]})`;
      chip.dataset.school = k;
      chip.addEventListener("click", () => {
        studySchool = k;
        document.querySelectorAll(".chip").forEach((c) => c.classList.remove("selected"));
        chip.classList.add("selected");
        renderStudyGrid();
      });
      box.appendChild(chip);
    });
  }

  function renderStudyGrid() {
    const q = $("study-search").value.trim();
    studyList = CHARACTERS.filter((c) => {
      if (studySchool !== "すべて" && schoolKey(c) !== studySchool) return false;
      if (q && !c.name.includes(q) && !c.fullName.includes(q) && !(c.reading || "").includes(q)) return false;
      return true;
    });
    $("study-count").textContent = `${studyList.length}件`;
    const grid = $("study-grid");
    grid.innerHTML = "";
    studyList.forEach((c, i) => {
      const item = document.createElement("div");
      item.className = "study-item";
      item.innerHTML = `<img src="images/${c.id}.png" loading="lazy" alt=""><span class="s-name">${c.name}</span>`;
      item.addEventListener("click", () => openDetail(i));
      grid.appendChild(item);
    });
  }

  $("study-search").addEventListener("input", renderStudyGrid);

  function openDetail(i) {
    studyIndex = i;
    const c = studyList[i];
    $("sd-portrait").src = c.full ? `images/full/${c.id}.png` : `images/${c.id}.png`;
    $("sd-fullname").textContent = c.fullName;
    $("sd-reading").textContent = c.reading ? `（${c.reading}）` : "";
    $("sd-halo").src = `images/${c.id}.png`;
    const dash = (v) => (v && v !== "-" ? v : "—");
    $("sd-school").textContent = dash(c.school);
    $("sd-club").textContent = dash(c.club);
    $("sd-birthday").textContent = dash(c.birthday);
    $("study-modal").classList.remove("hidden");
  }

  const closeModal = () => $("study-modal").classList.add("hidden");
  $("modal-close").addEventListener("click", closeModal);
  $("study-modal").addEventListener("click", (e) => {
    if (e.target === $("study-modal")) closeModal();
  });
  $("sd-prev").addEventListener("click", () => openDetail((studyIndex - 1 + studyList.length) % studyList.length));
  $("sd-next").addEventListener("click", () => openDetail((studyIndex + 1) % studyList.length));

  /* ---------- keyboard ---------- */
  document.addEventListener("keydown", (e) => {
    if (!$("study-modal").classList.contains("hidden")) {
      if (e.key === "Escape") closeModal();
      if (e.key === "ArrowLeft") $("sd-prev").click();
      if (e.key === "ArrowRight") $("sd-next").click();
      return;
    }
    if (screens.quiz.classList.contains("hidden")) return;
    if (document.activeElement === $("q-input")) return;
    if (revealing) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        nextQuestion();
      }
      return;
    }
    const n = Number(e.key);
    if (n >= 1 && n <= 8) {
      const btn = document.querySelectorAll(".choice-btn")[n - 1];
      if (btn && !btn.disabled) btn.click();
    }
  });
})();
</script>
</body>
</html>
